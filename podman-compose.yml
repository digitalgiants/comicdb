services:
  db:
    image: docker.io/library/postgres:18
    container_name: comicvault-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - comicvault_db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: comicvault-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8084:8084"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8084}
    container_name: comicvault-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8083:80"

volumes:
  comicvault_db:
